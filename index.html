<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.avif" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#00B8A9" />
    <title>EVO-A – Startup Ecosystem Platform</title>
    <meta name="description" content="EVO-A connects startups, investors, and incubators on one platform. Discover pitches, invest in the future, and grow your startup ecosystem." />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="EVO-A – Startup Ecosystem Platform" />
    <meta property="og:description" content="EVO-A connects startups, investors, and incubators on one platform." />
    <meta property="og:image" content="/vite.avif" />

    <!-- Preconnect for Google Fonts (eliminates render-blocking DNS + TLS cost) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />

    <!--
      Non-blocking Google Fonts load:
      media="print" makes the browser treat it as low-priority (non-blocking).
      onload switches it to media="all" once it downloads, applying it without
      ever blocking the initial render / FCP / LCP.
    -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <!-- Fallback for no-JS environments -->
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      />
    </noscript>

    <!-- Preconnect for Google AdSense -->
    <link rel="preconnect" href="https://pagead2.googlesyndication.com" crossorigin />
    <link rel="dns-prefetch" href="https://pagead2.googlesyndication.com" />

    <!-- Google AdSense — async so it never blocks rendering -->
    <script
      async
      src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6298386143677913"
      crossorigin="anonymous">
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
